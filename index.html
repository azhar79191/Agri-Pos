<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Primary SEO ── -->
    <title>AgroCare POS — Pesticide & Agricultural Management System</title>
    <meta name="description" content="AgroCare POS is a complete point-of-sale and inventory management system for pesticide and agricultural product retailers in Pakistan. Manage stock, sales, customers, invoices, and reports in real time." />
    <meta name="keywords" content="agri POS, pesticide management, agricultural inventory, Pakistan POS system, crop management software, fertilizer shop software, agri retail" />
    <meta name="author" content="AgroCare" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large" />
    <meta name="google-site-verification" content="-LZvBkOMbMjeXIpAHr_wKl--H_Ti55F9yQisVu-XMoU" />

    <!-- ── Canonical ── -->
    <link rel="canonical" href="https://agri-pos.vercel.app/" />

    <!-- ── Open Graph ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AgroCare POS" />
    <meta property="og:url" content="https://agri-pos.vercel.app/" />
    <meta property="og:title" content="AgroCare POS — Pesticide & Agricultural Management" />
    <meta property="og:description" content="Complete POS and inventory management for pesticide and agri product retailers. Real-time stock, invoices, customers, and analytics." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="AgroCare POS Dashboard" />
    <meta property="og:locale" content="en_PK" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@agrocare_pos" />
    <meta name="twitter:title" content="AgroCare POS — Pesticide & Agricultural Management" />
    <meta name="twitter:description" content="Complete POS and inventory management for pesticide and agri product retailers." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- ── Theme & PWA ── -->
    <meta name="theme-color" content="#10b981" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#052e1c" media="(prefers-color-scheme: dark)" />
    <meta name="msapplication-TileColor" content="#10b981" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AgroCare POS" />
    <meta name="application-name" content="AgroCare POS" />
    <meta name="format-detection" content="telephone=no" />

    <!-- ── Favicons ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ── Font preconnect (performance) ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ── DNS prefetch for API ── -->
    <link rel="dns-prefetch" href="https://agri-pos-api.vercel.app" />

    <!-- ── Structured Data (JSON-LD) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "AgroCare POS",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Complete point-of-sale and inventory management system for pesticide and agricultural product retailers in Pakistan.",
      "url": "https://agri-pos.vercel.app/",
      "author": {
        "@type": "Organization",
        "name": "AgroCare"
      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "PKR"
      },
      "featureList": [
        "Real-time inventory management",
        "Point of sale with barcode scanning",
        "Customer credit management",
        "Invoice generation and PDF export",
        "Sales analytics and reports",
        "Multi-user role-based access"
      ]
    }
    </script>

    <!-- ── Dark mode: apply before React hydrates (no flash) ── -->
    <script>
      (function() {
        try {
          var dm = localStorage.getItem('posDarkMode');
          if (dm === 'true') {
            document.documentElement.classList.add('dark');
            document.documentElement.style.background = '#071209';
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
